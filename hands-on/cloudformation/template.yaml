############################################################
# Conditions
############################################################
Conditions:
  # Override supplied -> use it instead of the region Mapping.
  UseOverride: !Not [!Equals [!Join ["", !Ref ClickPipesIngressCidrsOverride], ""]]
  # Use the baked region Mapping whenever no explicit override is given. FindInMap
  # selects by AWS::Region and falls back to the us-east-2 list for unlisted regions.
  UseRegionMap: !Not [!Condition UseOverride]
  # Seed CIDRs supplied.
  HasSeedCidrs: !Not [!Equals [!Join ["", !Ref SeedIngressCidrs], ""]]
  # Optional generator EC2.
  EnableEc2: !Equals [!Ref EnableGeneratorEc2, "true"]
  # Kinesis PROVISIONED mode needs an explicit shard count.
  IsProvisioned: !Equals [!Ref KinesisStreamMode, "PROVISIONED"]

############################################################
# Resources
############################################################
Resources:

  ##########################################################
  # Aurora PostgreSQL — CDC source for ClickPipes
  ##########################################################

  # Cluster parameter group: enable logical replication (required for CDC).
  # rds.logical_replication and wal_sender_timeout are static -> applied on the
  # reboot RDS performs when the group is attached at create time.
  AuroraClusterParameterGroup:
    Type: AWS::RDS::DBClusterParameterGroup
    Properties:
      Description: !Sub "${NamePrefix} Aurora PG params for ClickPipes CDC (logical replication)"
      Family: aurora-postgresql17
      Parameters:
        rds.logical_replication: "1"
        wal_sender_timeout: "0"

  # Instance parameter group: CDC replication-safety GUCs. These are INSTANCE-level
  # params (NOT valid in the cluster group above) and address the ClickPipes "Review
  # Postgres settings" checks for a CDC source:
  #   - max_slot_wal_keep_size bounds WAL kept for a lagging replication slot so a
  #     stuck/paused pipe can't grow storage unbounded (was -1 = unlimited). MB.
  #     Too low risks slot invalidation -> ClickPipes re-snapshots; raise if you
  #     pause the pipe for long stretches.
  #   - statement_timeout / idle_in_transaction_session_timeout cap long-running and
  #     idle-in-transaction sessions that block replication. ms (300000 = 5 min).
  # All three are dynamic, so they apply without a reboot.
  AuroraDbParameterGroup:
    Type: AWS::RDS::DBParameterGroup
    Properties:
      Description: !Sub "${NamePrefix} Aurora instance params for ClickPipes CDC safety"
      Family: aurora-postgresql17
      Parameters:
        max_slot_wal_keep_size: "2048"                 # MB (2 GiB)
        statement_timeout: "300000"                    # ms (5 min)
        idle_in_transaction_session_timeout: "300000"  # ms (5 min)

  AuroraDbSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: !Sub "${NamePrefix} Aurora subnet group"
      SubnetIds: !Ref SubnetIds

  AuroraSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "${NamePrefix} - ClickPipes (static IPs) + workshop access to Aurora 5432"
      VpcId: !Ref VpcId
      # Egress left to the default (allow-all) — Aurora needs no special egress.
      Tags:
        - { Key: Name, Value: !Sub "${NamePrefix}-aurora-sg" }

  # --- Aurora ingress, source 1: baked ClickPipes static IPs for the deploy region
  # One AWS::EC2::SecurityGroupIngress per IP. &{Cidr} lets the dotted IP form a
  # valid logical ID. FindInMap selects the region's list by AWS::Region; a region
  # not present in the Mapping falls back to the us-east-2 list (DefaultValue),
  # which is ClickPipes' own default. Gated by UseRegionMap (any region, no override).
  "Fn::ForEach::AuroraCpIngress":
    - Cidr
    - !FindInMap
      - ClickPipesEgressIps
      - !Ref "AWS::Region"
      - Cidrs
      - DefaultValue:
          - 3.131.130.196/32
          - 3.23.172.68/32
          - 3.20.208.150/32
          - 3.132.20.192/32
          - 18.119.76.110/32
          - 3.134.185.180/32
    - "AuroraCpIngress&{Cidr}":
        Type: AWS::EC2::SecurityGroupIngress
        Condition: UseRegionMap
        Properties:
          GroupId: !Ref AuroraSecurityGroup
          IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          CidrIp: !Ref Cidr
          Description: !Sub "ClickPipes static egress IP ${Cidr}"

  # --- Aurora ingress, source 2: override CIDRs (used instead of the Mapping) ---
  "Fn::ForEach::AuroraOverrideIngress":
    - Cidr
    - !Ref ClickPipesIngressCidrsOverride
    - "AuroraOverrideIngress&{Cidr}":
        Type: AWS::EC2::SecurityGroupIngress
        Condition: UseOverride
        Properties:
          GroupId: !Ref AuroraSecurityGroup
          IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          CidrIp: !Ref Cidr
          Description: !Sub "ClickPipes ingress (override) ${Cidr}"

  # --- Aurora ingress, source 3: seed/laptop CIDRs ----------------------------
  "Fn::ForEach::AuroraSeedIngress":
    - Cidr
    - !Ref SeedIngressCidrs
    - "AuroraSeedIngress&{Cidr}":
        Type: AWS::EC2::SecurityGroupIngress
        Condition: HasSeedCidrs
        Properties:
          GroupId: !Ref AuroraSecurityGroup
          IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          CidrIp: !Ref Cidr
          Description: !Sub "Workshop seeding ${Cidr}"

  # --- Aurora ingress, source 4: the generator EC2 (SG-to-SG) -----------------
  # Cleaner than Terraform's VPC-CIDR rule: only the generator SG is allowed, and
  # only when the EC2 is enabled. RDS split-horizon DNS gives the EC2 Aurora's
  # private IP inside the VPC, so this SG-to-SG rule is what it uses.
  AuroraGeneratorIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: EnableEc2
    Properties:
      GroupId: !Ref AuroraSecurityGroup
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      SourceSecurityGroupId: !Ref GeneratorSecurityGroup
      Description: In-VPC generator EC2

  AuroraCluster:
    Type: AWS::RDS::DBCluster
    # Throwaway workshop infra — explicit Delete so `delete-stack` tears it down
    # cleanly (mirrors Terraform skip_final_snapshot = true). Change to Snapshot/
    # Retain for anything you care about keeping.
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    # W1011 suppressed: the operator supplies the master password as a NoEcho
    # parameter (same as Terraform), reused for the seed scripts and ClickPipes.
    # RDS ManageMasterUserPassword would auto-generate it and complicate that flow.
    Metadata:
      cfn-lint: { config: { ignore_checks: [W1011] } }
    Properties:
      Engine: aurora-postgresql
      EngineVersion: !Ref AuroraEngineVersion
      DBClusterIdentifier: !Sub "${NamePrefix}-aurora-pg"
      DatabaseName: !Ref AuroraDatabaseName
      MasterUsername: !Ref AuroraMasterUsername
      MasterUserPassword: !Ref AuroraMasterPassword
      DBClusterParameterGroupName: !Ref AuroraClusterParameterGroup
      DBSubnetGroupName: !Ref AuroraDbSubnetGroup
      VpcSecurityGroupIds: [!Ref AuroraSecurityGroup]
      StorageEncrypted: true   # secure default (transparent; AWS-managed aws/rds key)

  AuroraInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      Engine: aurora-postgresql
      DBClusterIdentifier: !Ref AuroraCluster
      DBInstanceIdentifier: !Sub "${NamePrefix}-aurora-pg-1"
      DBInstanceClass: !Ref AuroraInstanceClass
      DBSubnetGroupName: !Ref AuroraDbSubnetGroup
      DBParameterGroupName: !Ref AuroraDbParameterGroup   # CDC-safety GUCs
      # Public so the seed scripts (and ClickPipes' static IPs) reach Aurora over
      # the public endpoint. This is the static-IP path's analogue of Terraform's
      # publicly_accessible = true.
      PubliclyAccessible: true

  ##########################################################
  # Kinesis — streaming (append-only) source + ClickPipes read role
  ##########################################################

  KinesisStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: !Sub "${NamePrefix}-events"
      RetentionPeriodHours: 24
      StreamModeDetails:
        StreamMode: !Ref KinesisStreamMode
      ShardCount: !If [IsProvisioned, !Ref KinesisShardCount, !Ref "AWS::NoValue"]

  # Role ClickPipes assumes to read the stream. The NAME MUST start with
  # "ClickHouseAccessRole-" (required by ClickPipes for Kinesis IAM-role auth) —
  # a functional name, intentionally not auto-generated. Trust principal is the
  # ClickHouse service's IAM principal (ClickHouseIamPrincipalArn).
  ClickPipesKinesisRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "ClickHouseAccessRole-${NamePrefix}-kinesis"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Ref ClickHouseIamPrincipalArn
            Action: sts:AssumeRole
      Policies:
        - PolicyName: !Sub "${NamePrefix}-kinesis-read"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: StreamLevel
                Effect: Allow
                Action:
                  - kinesis:DescribeStream
                  - kinesis:GetShardIterator
                  - kinesis:GetRecords
                  - kinesis:ListShards
                  - kinesis:RegisterStreamConsumer
                  - kinesis:DeregisterStreamConsumer
                  - kinesis:ListStreamConsumers
                Resource: !GetAtt KinesisStream.Arn
              - Sid: ConsumerLevel
                Effect: Allow
                Action:
                  - kinesis:SubscribeToShard
                  - kinesis:DescribeStreamConsumer
                Resource: !Sub "${KinesisStream.Arn}/*"
              - Sid: ListAll
                Effect: Allow
                Action: kinesis:ListStreams
                Resource: "*"

  ##########################################################
  # Optional in-VPC data-generator EC2
  #   Divergence from Terraform: passwords live in Secrets Manager (CFN cannot
  #   create SSM SecureString parameters). The shared bootstrap script reads them
  #   via SECRETS_SOURCE=secretsmanager.
  ##########################################################

  # CFN can't create an SSM SecureString, so the two DB passwords go in Secrets
  # Manager (encrypted with the AWS-managed aws/secretsmanager key by default).
  # Names are auto-generated to avoid the "scheduled for deletion" name-reuse
  # window if the stack is redeployed.
  AuroraPasswordSecret:
    Type: AWS::SecretsManager::Secret
    Condition: EnableEc2
    # W1011 (prefer dynamic references for secrets) is intentionally suppressed:
    # the point of this resource is to MATERIALIZE the operator-supplied NoEcho
    # password into Secrets Manager so the generator EC2 can read it at runtime.
    Metadata:
      cfn-lint: { config: { ignore_checks: [W1011] } }
    Properties:
      Description: !Sub "${NamePrefix} Aurora master password (read by the generator EC2)"
      SecretString: !Ref AuroraMasterPassword

  ClickpipesPasswordSecret:
    Type: AWS::SecretsManager::Secret
    Condition: EnableEc2
    Metadata:
      cfn-lint: { config: { ignore_checks: [W1011] } }
    Properties:
      Description: !Sub "${NamePrefix} clickpipes_user password (read by the generator EC2)"
      SecretString: !Ref ClickpipesUserPassword

  GeneratorRole:
    Type: AWS::IAM::Role
    Condition: EnableEc2
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: ec2.amazonaws.com }
            Action: sts:AssumeRole
      # Session Manager (keyless shell; no inbound port).
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: kinesis-produce
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - kinesis:PutRecord
                  - kinesis:PutRecords
                  - kinesis:DescribeStream
                  - kinesis:DescribeStreamSummary
                  - kinesis:ListShards
                Resource: !GetAtt KinesisStream.Arn
        - PolicyName: read-db-secrets
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource:
                  - !Ref AuroraPasswordSecret
                  - !Ref ClickpipesPasswordSecret

  GeneratorInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Condition: EnableEc2
    Properties:
      Roles: [!Ref GeneratorRole]

  GeneratorSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Condition: EnableEc2
    Properties:
      GroupDescription: !Sub "${NamePrefix} egress-only SG for the in-VPC data generator EC2"
      VpcId: !Ref VpcId
      # No inbound (Session Manager needs none). Egress: SSM, GitHub, Kinesis, Aurora.
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: 0.0.0.0/0
          Description: All outbound (SSM, GitHub, Kinesis, Aurora 5432)
      Tags:
        - { Key: Name, Value: !Sub "${NamePrefix}-generator-sg" }

  GeneratorInstance:
    Type: AWS::EC2::Instance
    Condition: EnableEc2
    # CFN only infers ordering from Ref/GetAtt, and the user_data references the
    # cluster ENDPOINT — which exists before the DB instance is accepting
    # connections (and before the logical-replication reboot). Without this, the
    # EC2 first-boot runs migrations against an Aurora that isn't ready yet and
    # dies with "server closed the connection unexpectedly". Wait for the writer
    # instance to reach CREATE_COMPLETE (available) before launching the generator.
    DependsOn: AuroraInstance
    Properties:
      ImageId: !Ref Al2023Ami
      InstanceType: !Ref Ec2InstanceType
      # First subnet from the list; must be public (default-VPC subnets are) so
      # outbound reaches IGW — there is no NAT gateway.
      SubnetId: !Select [0, !Ref SubnetIds]
      SecurityGroupIds: [!Ref GeneratorSecurityGroup]
      IamInstanceProfile: !Ref GeneratorInstanceProfile
      Tags:
        - { Key: Name, Value: !Sub "${NamePrefix}-generator" }
      # Thin user_data: write the non-secret config + the SECRETS_SOURCE selector
      # and the secret ARNs, clone the repo, hand off to the committed bootstrap.
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euxo pipefail

          cat > /etc/ch-workshop.env <<EOF
          REPO_URL=${RepoUrl}
          REPO_BRANCH=${RepoBranch}
          AWS_REGION=${AWS::Region}
          KINESIS_STREAM_NAME=${KinesisStream}
          PG_HOST=${AuroraCluster.Endpoint.Address}
          PG_DATABASE=${AuroraDatabaseName}
          PG_USER=${AuroraMasterUsername}
          SECRETS_SOURCE=secretsmanager
          SSM_PG_PASSWORD=${AuroraPasswordSecret}
          SSM_CLICKPIPES_PASSWORD=${ClickpipesPasswordSecret}
          CDC_SLEEP=${GeneratorCdcSleep}
          KINESIS_RATE=${GeneratorKinesisRate}
          CLONE_DIR=/opt/ch-workshop
          EOF

          dnf install -y git

          if [ ! -d /opt/ch-workshop/.git ]; then
            git clone --branch ${RepoBranch} --depth 1 ${RepoUrl} /opt/ch-workshop
          else
            git -C /opt/ch-workshop pull --ff-only || true
          fi

          exec bash /opt/ch-workshop/hands-on/scripts/ec2_bootstrap.sh

############################################################
# Outputs — wire the manual ClickHouse/ClickPipes UI steps from these
############################################################
Outputs:
  AuroraWriterEndpoint:
    Description: Aurora writer endpoint — the Postgres ClickPipe host and the seed scripts' PGHOST.
    Value: !GetAtt AuroraCluster.Endpoint.Address
  AuroraReaderEndpoint:
    Description: Aurora reader endpoint.
    Value: !GetAtt AuroraCluster.ReadEndpoint.Address
  AuroraPort:
    Description: Aurora port.
    Value: !GetAtt AuroraCluster.Endpoint.Port
  AuroraDatabaseName:
    Description: Aurora database name.
    Value: !Ref AuroraDatabaseName
  AuroraSecurityGroupId:
    Description: Aurora security group ID (where the ClickPipes static-IP ingress rules live).
    Value: !Ref AuroraSecurityGroup
  KinesisStreamName:
    Description: Kinesis stream name — point the Kinesis ClickPipe (and kinesis_producer.py) here.
    Value: !Ref KinesisStream
  KinesisStreamArn:
    Description: Kinesis stream ARN.
    Value: !GetAtt KinesisStream.Arn
  ClickPipesKinesisRoleArn:
    Description: IAM role ARN ClickPipes assumes to read Kinesis — use as the role ARN in the Kinesis pipe.
    Value: !GetAtt ClickPipesKinesisRole.Arn
  GeneratorInstanceId:
    Condition: EnableEc2
    Description: Instance ID of the in-VPC generator EC2.
    Value: !Ref GeneratorInstance
  GeneratorSsmCommand:
    Condition: EnableEc2
    Description: Open a shell on the generator EC2 via Session Manager (no SSH/keys).
    Value: !Sub "aws ssm start-session --target ${GeneratorInstance} --region ${AWS::Region}"
