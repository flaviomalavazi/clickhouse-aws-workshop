AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::LanguageExtensions

Description: >-
  ClickHouse AWS workshop — CloudFormation alternative to the Terraform AWS stack
  (hands-on/terraform/). Mirrors the AWS half: Aurora PostgreSQL (CDC source),
  a Kinesis stream, the IAM role ClickPipes assumes to read it, and an optional
  in-VPC data-generator EC2. The ONE intended difference vs Terraform: instead of
  PrivateLink (NLB + VPC endpoint service + reverse private endpoint), Aurora is
  reached by allow-listing ClickPipes' static egress IPs on the Aurora security
  group. The ClickHouse Cloud service and the ClickPipes themselves are NOT created
  here (they are ClickHouse-provider resources) — see README.md for the manual UI
  steps. Terraform remains the source of truth.

############################################################
# Metadata — console parameter grouping
############################################################
Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label: { default: "Naming & networking" }
        Parameters: [NamePrefix, VpcId, SubnetIds]
      - Label: { default: "Aurora PostgreSQL" }
        Parameters:
          - AuroraEngineVersion
          - AuroraInstanceClass
          - AuroraDatabaseName
          - AuroraMasterUsername
          - AuroraMasterPassword
          - ClickpipesUserPassword
      - Label: { default: "Aurora ingress (ClickPipes static IPs + seeding)" }
        Parameters: [ClickPipesIngressCidrsOverride, SeedIngressCidrs]
      - Label: { default: "Kinesis & ClickPipes role" }
        Parameters: [KinesisStreamMode, KinesisShardCount, ClickHouseIamPrincipalArn]
      - Label: { default: "Optional in-VPC generator EC2" }
        Parameters:
          - EnableGeneratorEc2
          - RepoUrl
          - RepoBranch
          - Ec2InstanceType
          - GeneratorCdcSleep
          - GeneratorKinesisRate
          - Al2023Ami
    ParameterLabels:
      ClickHouseIamPrincipalArn: { default: "ClickHouse service IAM principal ARN" }

############################################################
# Parameters — mirror hands-on/terraform/terraform.tfvars
############################################################
Parameters:
  NamePrefix:
    Type: String
    Default: ch-aws-workshop
    Description: Prefix applied to created resource names.
    AllowedPattern: "^[a-zA-Z][a-zA-Z0-9-]{1,40}$"

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: >-
      VPC to place Aurora (and the optional generator EC2) in. Use the region's
      default VPC unless you have a reason not to. CFN cannot auto-discover the
      default VPC the way Terraform's data sources do, so this is explicit.

  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: >-
      At least two subnets in different AZs for the Aurora DB subnet group. Use the
      default VPC's (public) subnets — ClickPipes reaches Aurora over the public
      endpoint via the allow-listed static IPs, and the generator EC2 needs a public
      subnet for outbound (SSM/GitHub/Kinesis) since there is no NAT gateway.

  AuroraEngineVersion:
    Type: String
    Default: "17.7"
    Description: Aurora PostgreSQL engine version (must be 12+ for ClickPipes CDC; family below pins 17).

  AuroraInstanceClass:
    Type: String
    Default: db.t4g.medium
    Description: Instance class for the Aurora writer.

  AuroraDatabaseName:
    Type: String
    Default: appdb
    Description: Initial database created in the Aurora cluster.
    AllowedPattern: "^[a-zA-Z][a-zA-Z0-9_]{0,62}$"

  AuroraMasterUsername:
    Type: String
    Default: postgres
    Description: Aurora master (admin) username.
    AllowedPattern: "^[a-zA-Z][a-zA-Z0-9_]{0,62}$"

  AuroraMasterPassword:
    Type: String
    NoEcho: true
    MinLength: 8
    Description: Aurora master password. 8+ chars; avoid '/', '@', '"' and spaces (RDS restriction).

  ClickpipesUserPassword:
    Type: String
    NoEcho: true
    MinLength: 8
    Description: >-
      Password for the dedicated clickpipes_user role ClickPipes uses to read Aurora.
      Used by the seed/migration scripts to create the role; entered again in the
      ClickPipes UI when the Postgres pipe is created.

  ClickHouseIamPrincipalArn:
    Type: String
    Default: ""
    Description: >-
      The ClickHouse Cloud service's IAM principal ARN (the "Service role ID (IAM)"
      in the Cloud console). Trusted by the Kinesis role so ClickPipes can assume it.
      Create the ClickHouse service FIRST, then deploy with this value. Leave empty
      only if you will not use the Kinesis ClickPipe.

  KinesisStreamMode:
    Type: String
    Default: ON_DEMAND
    AllowedValues: [ON_DEMAND, PROVISIONED]
    Description: Kinesis capacity mode.

  KinesisShardCount:
    Type: Number
    Default: 1
    MinValue: 1
    Description: Shard count when KinesisStreamMode = PROVISIONED (ignored for ON_DEMAND).

  ClickPipesIngressCidrsOverride:
    Type: CommaDelimitedList
    Default: ""
    Description: >-
      Optional. Comma-separated /32 CIDRs to allow inbound to Aurora on 5432, used
      INSTEAD of the baked per-region static-IP Mapping. Normally unnecessary: the
      Mapping auto-selects the deploy region's ClickPipes IPs (with a us-east-2
      fallback). Use this only as the escape hatch if the baked list goes stale vs
      the docs. See the ClickPipes static-IP docs (README).

  SeedIngressCidrs:
    Type: CommaDelimitedList
    Default: ""
    Description: >-
      Optional. Comma-separated CIDRs (e.g. your laptop's <ip>/32) allowed inbound
      to Aurora on 5432 so the seed/migration scripts can reach it from outside the
      VPC. Not needed if you use the generator EC2.

  EnableGeneratorEc2:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: >-
      Create an in-VPC EC2 that self-bootstraps (clone -> migrate -> seed -> run
      generators). Reaches Aurora over its private IP (SG-to-SG), so no public-IP
      allow-listing is needed for seeding.

  RepoUrl:
    Type: String
    Default: ""
    Description: Public HTTPS git URL of this workshop repo, cloned by the generator EC2. Required when EnableGeneratorEc2 = true.

  RepoBranch:
    Type: String
    Default: main
    Description: Git branch the generator EC2 checks out.

  Ec2InstanceType:
    Type: String
    Default: t4g.micro
    Description: Instance type for the generator EC2.

  GeneratorCdcSleep:
    Type: Number
    Default: 0.1
    Description: Seconds between simulated CDC mutations on the generator EC2 (run_generators.py --cdc-sleep).

  GeneratorKinesisRate:
    Type: Number
    Default: 1000
    Description: Kinesis events per second produced by the generator EC2 (run_generators.py --kinesis-rate).

  Al2023Ami:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-arm64
    Description: >-
      AL2023 AMI, resolved from the public SSM alias at deploy time (ships the SSM
      agent for Session Manager). Leave the default.

